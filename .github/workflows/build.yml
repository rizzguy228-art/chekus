name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Forge MDK
        run: |
          wget https://maven.minecraftforge.net/net/minecraftforge/forge/1.20.1-47.3.0/forge-1.20.1-47.3.0-mdk.zip -O forge-mdk.zip
          unzip forge-mdk.zip -d forge-mdk
          cp -r src forge-mdk/
          cp build.gradle forge-mdk/
          cp settings.gradle forge-mdk/
          cp gradle.properties forge-mdk/

      - name: Build
        working-directory: forge-mdk
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: chekushka-mod
          path: forge-mdk/build/libs/*.jar
